<div class="grid grid-cols-3 grid-cols-[3fr_1fr_1fr]">
  <div class="flex items-center gap-4">
    <img
      [src]="item().product.imageUrl"
      alt="{{ item().product.name }}"
      class="w-24 h-24 object-cover rounded-lg"
    />
    <div>
      <h3 class="text-lg font-semibold">{{ item().product.name }}</h3>
      <p class="text-sm text-gray-600">Price: ${{ item().product.price }}</p>
      <!-- <p class="text-sm text-gray-600">Quantity: {{ item().quantity }}</p> -->
    </div>
  </div>
  <app-qty-selector
    [quantity]="item().quantity"
    (qtyUpdated)="store.setItemQuantity({ productId: item().product.id, quantity: $event })"
  />

  <div class="flex flex-col items-end">
    <div class="text-right text-lg font-bold">${{ total() }}</div>

    <div class="flex -me-3">
      <button mat-icon-button (click)="store.moveToWishlist(item().product)">
        <mat-icon>favorite_border</mat-icon>
      </button>
      <button mat-icon-button class="red-btn" (click)="store.removeFromCart(item().product)">
        <mat-icon>delete</mat-icon>
      </button>
    </div>
  </div>
</div>
