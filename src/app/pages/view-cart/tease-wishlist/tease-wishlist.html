<div appViewPanal class="flex items-center justify-between">
  <div class="flex items-center gap-3">
    <mat-icon class="!text-red-500">favorite_border</mat-icon>
    <div>
      <h2 class="text-xl font-bold">Wishlist ({{ store.wishlistCount() }})</h2>
      <p class="text-gray-500 text-sm">
        You have {{ store.wishlistCount() }} items save for later.
      </p>
    </div>
  </div>
  <div class="flex items-center gap-3">
    <button mat-raised-button routerLink="/wishlist">View All</button>
    <button
      mat-raised-button
      class="flex items-center gap-2"
      (click)="store.addAllWishlistToCart()"
    >
      <mat-icon>shopping_cart</mat-icon>Add All to Cart
    </button>
  </div>
</div>
