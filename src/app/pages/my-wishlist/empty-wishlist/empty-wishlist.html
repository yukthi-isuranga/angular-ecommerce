<div class="min-h-[70vh] flex items-center justify-center px-4">
  <div
    class="max-w-md w-full text-center p-8 rounded-2xl shadow-lg bg-white border border-gray-100"
  >
    <!-- Icon -->
    <div class="w-20 h-20 mx-auto flex items-center justify-center rounded-full bg-red-50 mb-6">
      <mat-icon class="text-5xl text-red-500">favorite_border</mat-icon>
    </div>

    <!-- Title -->
    <h2 class="text-2xl font-semibold text-gray-800">Your wishlist is empty</h2>

    <!-- Subtitle -->
    <p class="text-gray-500 mt-3 leading-relaxed">
      Save items you love to your wishlist and review them anytime.
    </p>

    <!-- Action Button -->
    <button
      mat-flat-button
      class="mt-6 w-full !bg-blue-500 hover:!bg-blue-600 !text-white !rounded-xl !py-3 transition-all duration-300 shadow-md"
      routerLink="/products/All"
    >
      Continue Shopping
    </button>

    <!-- Optional secondary action -->
    <button mat-button class="mt-3 text-gray-500 hover:text-blue-500 transition">
      Explore trending items
    </button>
  </div>
</div>
